workflows:
  ios-build:
    name: iOS Build (知趣微光)
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build iOS
        script: |
          flutter pub get
          flutter build ios --release --no-codesign
      - name: Create unsigned IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r flutter_app.ipa Payload
          rm -rf Payload
    artifacts:
      - flutter_app.ipa
