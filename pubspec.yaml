name: flutter_zhiquweiguang
description: 知趣微光 Flutter 版 - 一个优雅的社交内容平台
publish_to: none
version: 0.8.1+68

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 网络请求
  dio: ^5.4.0
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # 路由
  go_router: ^13.0.0
  
  # 图片
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # Markdown 渲染
  flutter_markdown: ^0.6.22
  path_provider: ^2.1.3

  # 视频播放
  video_player: ^2.9.2
  chewie: ^1.8.5
  package_info_plus: 8.3.1
  
  # 工具
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
flutter:
  uses-material-design: true
  assets: []

